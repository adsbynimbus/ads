name: Sellers.json validation

on:
  push:
    branches-ignore:
      - main
    paths:
      - "sellers.json"

permissions:
  contents: write

jobs:
  verify-json-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip bot commits (prevents infinite loop)
        run: |
          if [ "${{ github.actor }}" = "github-actions[bot]" ]; then
            echo "Bot commit detected, exiting to prevent loop"
            exit 0
          fi

      - name: Validate sellers.json syntax
        run: jq -e . sellers.json > /dev/null

      - name: Update JSON timestamp
        run: |
          tmp="$(mktemp)"
          jq '.ext.last_updated = (now | todate)' sellers.json > "$tmp"
          mv "$tmp" sellers.json

      - name: Commit and push changes (safe branch handling)
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add sellers.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          BRANCH="${GITHUB_REF_NAME}"

          # safety: strip PR merge refs like "123/merge"
          if [[ "$BRANCH" == */merge ]]; then
            echo "Detected merge ref, skipping push"
            exit 0
          fi

          git commit -m "Update sellers.json timestamp"
          git push origin HEAD:refs/heads/$BRANCH