name: Sellers.json validation

on:
  push:
    branches-ignore:
      - main
    paths:
      - "sellers.json"
  pull_request:
    branches:
      - main
    paths:
      - "sellers.json"

jobs:
  verify-json-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: ads

      - name: Validate sellers.json syntax
        working-directory: ads
        run: jq -e . sellers.json > /dev/null

      - name: Update JSON timestamp
        working-directory: ads
        run: |
          tmp="$(mktemp)"
          jq '.ext.last_updated = (now | todate)' sellers.json > "$tmp"
          mv "$tmp" sellers.json

      - name: Commit and push changes
        working-directory: ads
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add sellers.json
          git diff --cached --quiet || git commit -m "Update sellers.json timestamp"
          git push